services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mogbot
      POSTGRES_PASSWORD: mogbot
      POSTGRES_DB: mogbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mogbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mogbot

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env.${ENV:-local}
    environment:
      - ENV=${ENV:-local}
      - DATABASE_URL=postgresql://mogbot:mogbot@db:5432/mogbot
    volumes:
      - workspace:/app/workspace
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mogbot

  webapp:
    build: ./webapp
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mogbot

networks:
  mogbot:
    driver: bridge

volumes:
  pgdata:
  workspace:
