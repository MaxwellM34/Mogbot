services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mogbot
      POSTGRES_PASSWORD: mogbot
      POSTGRES_DB: mogbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mogbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mogbot:mogbot@db:5432/mogbot
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE_DIR=/app/workspace
    volumes:
      - workspace:/app/workspace
    depends_on:
      db:
        condition: service_healthy

  webapp:
    build: ./webapp
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  workspace:
