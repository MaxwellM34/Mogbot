<!DOCTYPE html>
<html>
<head>
  <title>Mogbot</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 20px; }
    #input-row { display: flex; gap: 10px; margin-bottom: 20px; }
    input { padding: 12px; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; font-size: 16px; font-family: monospace; }
    #task { flex: 1; }
    #budget { width: 140px; }
    button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2ea043; }
    #logs { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; height: 65vh; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
    .log { margin: 2px 0; }
    .result { color: #3fb950; font-weight: bold; }
    .error { color: #f85149; }
    .budget { color: #d29922; font-weight: bold; }
    #budget-bar { margin-bottom: 12px; display: none; }
    #budget-bar .bar-bg { background: #30363d; border-radius: 4px; height: 8px; }
    #budget-bar .bar-fill { background: #238636; border-radius: 4px; height: 8px; transition: width 0.3s; }
    #budget-label { color: #8b949e; font-size: 13px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Mogbot</h1>
  <p style="color:#8b949e;margin-bottom:16px;font-style:italic;">mogging tasks so you don't have to</p>
  <div id="input-row">
    <input id="task" placeholder="Drop a task to mog..." autofocus
           onkeydown="if(event.key==='Enter')send()">
    <input id="budget" type="number" step="0.10" min="0.01" placeholder="Budget (CAD $)" value="1.00">
    <button onclick="send()">Mog It</button>
  </div>
  <div id="budget-bar">
    <div id="budget-label"></div>
    <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  </div>
  <div id="logs"></div>
  <script>
    const ws = new WebSocket(`ws://${location.host}`);
    const logs = document.getElementById("logs");

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      const div = document.createElement("div");
      div.className = `log ${msg.type}`;
      div.textContent = msg.data;
      logs.appendChild(div);
      logs.scrollTop = logs.scrollHeight;

      // Update budget bar from cost log lines
      if (msg.type === "log" && msg.data.includes("Spent:")) {
        const spentMatch = msg.data.match(/Spent: \$([0-9.]+)/);
        const budgetMatch = msg.data.match(/Budget: \$([0-9.]+)/);
        if (spentMatch && budgetMatch) {
          const spent = parseFloat(spentMatch[1]);
          const budget = parseFloat(budgetMatch[1]);
          const pct = Math.min((spent / budget) * 100, 100);
          const bar = document.getElementById("budget-bar");
          const fill = document.getElementById("bar-fill");
          const label = document.getElementById("budget-label");
          bar.style.display = "block";
          fill.style.width = pct + "%";
          fill.style.background = pct > 80 ? "#f85149" : pct > 50 ? "#d29922" : "#238636";
          label.textContent = `$${spent.toFixed(4)} / $${budget.toFixed(2)} CAD (${pct.toFixed(1)}%)`;
        }
      }
    };

    function send() {
      const input = document.getElementById("task");
      const budgetInput = document.getElementById("budget");
      const budgetCAD = parseFloat(budgetInput.value);
      if (!input.value.trim()) return;
      if (!budgetCAD || budgetCAD <= 0) {
        alert("Set a budget in CAD before running.");
        return;
      }
      logs.innerHTML = "";
      document.getElementById("budget-bar").style.display = "none";
      ws.send(JSON.stringify({ task: input.value, budgetCAD }));
      input.value = "";
    }
  </script>
</body>
</html>
