<!DOCTYPE html>
<html>
<head>
  <title>Mogbot</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 20px; }
    #input-row { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; font-size: 16px; font-family: monospace; }
    button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2ea043; }
    #logs { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; height: 70vh; overflow-y: auto; white-space: pre-wrap; font-size: 14px; }
    .log { margin: 2px 0; }
    .result { color: #3fb950; font-weight: bold; }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <h1>Mogbot</h1>
  <p style="color:#8b949e;margin-bottom:16px;font-style:italic;">mogging tasks so you don't have to</p>
  <div id="input-row">
    <input id="task" placeholder="Drop a task to mog..." autofocus
           onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">Mog It</button>
  </div>
  <div id="logs"></div>
  <script>
    const ws = new WebSocket(`ws://${location.host}`);
    const logs = document.getElementById("logs");

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      const div = document.createElement("div");
      div.className = `log ${msg.type}`;
      div.textContent = msg.data;
      logs.appendChild(div);
      logs.scrollTop = logs.scrollHeight;
    };

    function send() {
      const input = document.getElementById("task");
      if (!input.value.trim()) return;
      logs.innerHTML = "";
      ws.send(JSON.stringify({ task: input.value }));
      input.value = "";
    }
  </script>
</body>
</html>
